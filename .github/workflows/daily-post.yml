name: Daily Lunch Post

on:
  schedule:
    # Noon PT = 19:00 UTC (PDT, Mar-Nov) or 20:00 UTC (PST, Nov-Mar)
    # Both are scheduled; the duplicate-post guard in the API prevents double posts.
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"
  workflow_dispatch: {} # Allow manual trigger

jobs:
  post-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Check if it's noon PT
        id: check
        run: |
          PT_HOUR=$(TZ=America/Los_Angeles date +%H)
          echo "pt_hour=$PT_HOUR" >> "$GITHUB_OUTPUT"
          if [ "$PT_HOUR" = "12" ]; then echo "is_noon=true" >> "$GITHUB_OUTPUT"; else echo "is_noon=false" >> "$GITHUB_OUTPUT"; fi
      - name: Trigger daily lunch post
        if: steps.check.outputs.is_noon == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sf "${{ secrets.APP_URL }}/api/slack/post-daily?secret=${{ secrets.CRON_SECRET }}"
